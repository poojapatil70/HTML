<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <input type="text" id="input">
    <p id="display"></p>
    <button onclick="leapYear()">click</button>
    <script>
        function leapYear() {
            let year = document.getElementById("input").value;
            let output = "";
            if (year % 400 == 0) {
                output = "leap century"
            }
            else if (year % 100 == 0 && year % 400 != 0) {
                output = "not a leap century"

            }
            else if (year % 4 == 0) {
                output = "is a leap year"

            }
            else {
                output = "not a leap yr"

            }
            document.getElementById("display").innerHTML = output;
        }
    </script>

</body>

</html>
