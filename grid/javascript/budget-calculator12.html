<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>average </title>
</head>
<style>
    .container {
        height: 100vh;
        width: 100vw;
        background-color: rgb(207, 161, 217);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }

    .input-one,
    .input-two {
        background-color: rgb(233, 232, 173);
        height: 10%;
        width: 30%;
        border: 2px solid;
        margin: 10px;
    }

    button {
        background-color: rgb(225, 233, 140);
        height: 40px;
        width: 90%;
    }
    
    .display-box1 {
        height: 20%;
        width: 50%;
        background-color: rgb(231, 177, 223);
        border: 2px solid;
        margin: 10px;
    }
</style>

<body>
    <div class="container">
        <h1>Average Calculator</h1>

        <h2>INCOME</h2>

        <input class="input-one" type=" text" id="input-one">

        <input class="input-two" type="text" id="input-two">

        <input class="input-one" type=" text" id="input-three">
        
        <div class="container">
            <h2>EXPENSE </h2>
            <input class="input-one" type=" text" id="input-four">

            <input class="input-one" type=" text" id="input-five">

            <input class="input-one" type=" text" id="input-six">

            <div class="display-box1" id="display1"></div>

            <button class="button" onclick="myFunction()">CLick Me</button>
        </div>
   
    <script>

        function myFunction() {
            let Inc1 = Number(document.getElementById("input-one").value);
            let Inc2 = Number(document.getElementById("input-two").value);
            let Inc3 = Number(document.getElementById("input-three").value);
            let Exp1 = Number(document.getElementById("input-four").value);
            let Exp2 = Number(document.getElementById("input-five").value);
            let Exp3 = Number(document.getElementById("input-six").value);

            let totalInc =   Inc1 + Inc2 + Inc3;
            let totalExpense =  Exp1 + Exp2 + Exp3;
            let totalSavings =  totalInc - totalExpense;
           let  dailySavings = totalSavings/30


            document.getElementById("display1").innerHTML = "Total Income: " + totalInc + "<br>" + "Total Expernse : " + totalExpense + "<br>" + "Total savings: " + totalSavings + "<br>" + "Daily Savings: " +dailySavings;
        }

        myFunction();

    </script>

</body>

</html>
