<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .container{
        height: 100vh;
        width: 100vw;
        background-color: rgb(222, 234, 113);
        display: flex;
        flex-direction: column; 
        justify-content: center;
        align-items: center;
        
      
    }
    .input-one, .input-two{
        height: 30px;
        width: 40%;
        border: 2px solid;
        margin: 10px;
     
    }
    button{
        background-color: aqua;
        height: 40px;
        width: 80px;
    }
    .display-box{
        height: 30px;
        width: 30%;
        background-color: beige;
        border: 1px solid;
        margin: 10px;

    }
</style>
<body>
    <div class="container">
    <h1>JAVASCRIPT Classes</h1>
    <input class="input-one" type = " text" id="input-one">
    <input class="input-two" type = "text" id ="input-two">
    <div class ="display-box" id="display"></div>
    <button class="button" onclick="myFunction()">Click Me</button>
    </div>

    <script>
        // function is a block of code that perform specific task
        // It is reusable and can be called multiple times in a program
        // functions can take input parameters and return output values
        // They help to organize code, improve readability , and promote code reusability

        //function declaration
        function myFunction(){
            let x = Number(document.getElementById("input-one").value);//use to give input on ui
            let y =Number( document.getElementById("input-two").value);
            let z = x + y;
            document.getElementById("display").innerHTML = z;
            console.log( z) ;

        }

    //  calling the function
    myFunction();
        
    </script>
    
</body>
</html>
