<!DOCTYPE html>
<html>
<head>
<title>simple if else</title>
<style>
body{
    font-family: Arial;
    text-align: center;
    margin-top: 100px;
}
.container{
    border:1px solid #ccc;
    padding:20px;
    width:300px;
    margin:auto;
    border-radius:10px;
}
button{
    padding:10px 20px;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="container">
    <h2>Vote Eligibility Checker</h2>
 <input type="number" id="inp1" placeholder="Enter your age">
    <br><br>
<button onclick="checkVote()">Check</button>
<h3 class="display" id="display"></h3>
</div>


<script>
function checkVote(){
    let age = Number(document.getElementById("inp1").value);

    if(age>= 18){
        document.getElementById("display").innerHTML = "you are eligible to vote!"
    }
    else{
         document.getElementById("display").innerHTML = "you are not eligible to vote!"

    }
}

</script>

</body>
</html>
