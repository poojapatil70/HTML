
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Area of radius formula</title>
</head>
<body>
    <input type="text" id="input-one" class="input">
    <button onclick="myfunction()">click me</button>
</body>
<script>
   // Function to calculate area of a circle
   
function myfunction(){
    let y = Number(document.getElementById("input-one").value);
    let z = y*y* 3.14;
    console.log(z);
}


      
</script>
