<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>student grade checker</title>
</head>
<input type="text" id="input-one">
<button onclick="CheckGrade()">click </button>
<p id="display"></p>

<body>

    <script>

        function CheckGrade() {
            let marks = document.getElementById("input-one").value;
            let grade = (marks >= 90) ? "A+" :
                (marks >= 75) ? "A" :
                    (marks >= 65) ? "B" :
                        (marks >= 55) ? "C" :
                            (marks >= 35) ? "D" : "Fail";

            document.getElementById("display").innerHTML =  grade;

        }
    </script>
</body>

</html>
