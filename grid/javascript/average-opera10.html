<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>average </title>
</head>
<style>
    .container {
        height: 100vh;
        width: 100vw;
        background-color: rgb(222, 234, 113);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }

    .input-one,
    .input-two {
        background-color: rgb(233, 232, 173);
        height: 10%;
        width: 30%;
        border: 2px solid;
        margin: 10px;
    }

    button {
        background-color: rgb(84, 220, 77);
        height: 40px;
        width: 90%;
    }

    .display-box1 {
        height: 20%;
        width: 50%;
        background-color: rgb(231, 177, 223);
        border: 2px solid;
        margin: 10px;
    }
</style>

<body>
    <div class="container">
        <h1>Addition Quiz</h1>

        <input class="input-one" type=" text" id="input-one">

        <input class="input-two" type="text" id="input-two">

        <input class="input-one" type=" text" id="input-three">

        <div class="display-box1" id="display1"></div>


        <button class="button" onclick="myFunction()">CLick Me</button>
    </div>

    <script>

        function myFunction() {
            let x = Number (document.getElementById("input-one").value);
            let y = Number(document.getElementById("input-two").value);
            let z = Number (document.getElementById("input-three").value);

            //BODMAS => Bracket, order, Division , Multiplication, Addition , Subtraction

            let a = (x + y + z)/3;
            
            console.log(a)
             document.getElementById("display1").innerHTML = a
        }

        myFunction();
    </script>

</body>

</html>
