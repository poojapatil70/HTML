<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .container {
        height: 500px;
        width: 500px;
        background-color: rgb(222, 234, 113);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        
    }

    .input-one,
    .input-two
   {background-color: rgb(233, 232, 173);
        height: 8%;
        width: 20%;
        border: 2px solid;
        margin: 5px;
    }

    button {
        background-color: rgb(12, 32, 37);
        height: 40px;
        width: 50%;
    }

    .display-box1 {
        height: 20%;
        width: 50%;
        background-color: rgb(231, 177, 223);
        border: 2px solid;
        margin: 10px;
    }
</style>

<body>
    <div class="container">
           <h1>JAVASCRIPT Classes</h1>

         <div class="display-box1" id="display"></div>

            <input class="input-one" type=" number" id="input-one">
           <input class="input-two" type="number" id="input-two">
        
        <button class="button1" onclick="functionAdd()">Add +</button>
         <button class="button2" onclick="functionSubtract()">Sub _</button>
          <button class="button3" onclick="functionMultiply()">Multi */</button>
           <button class="button4" onclick="functionDivide()">Div /</button>
    </div>

    <script>
      
        function functionAdd(){
        let a = document.getElementById("input-one").value;
        let b = document.getElementById("input-two").value;
        z = Number(a) + Number(b)
         document.getElementById("display").innerHTML = "<h1> " + z + " </h1>" ;
       document.getElementById("display").style = "color : lightgreen; font-weight : bold "
       }

        function functionSubtract(){
        let c = document.getElementById("input-one").value;
        let d = document.getElementById("input-two").value;
        z = c - d
         document.getElementById("display").innerHTML = "<h1> " + z + " </h1>" ;
       document.getElementById("display").style = "color : lightgreen; font-weight : bold "
      }

       function functionMultiply(){
        let e = document.getElementById("input-one").value;
        let f = document.getElementById("input-two").value;
        z = e * f
         document.getElementById("display").innerHTML = "<h1> " + z + " </h1>" ;
       document.getElementById("display").style = "color : lightgreen; font-weight : bold "
      }

       function functionDivide(){
        let g = document.getElementById("input-one").value;
        let h = document.getElementById("input-two").value;
        z = g / h
        document.getElementById("display").innerHTML = "<h1> " + z + " </h1>" ;
       document.getElementById("display").style = "color : lightgreen; font-weight : bold "
           
        }
        
      
    </script>

</body>

</html>
