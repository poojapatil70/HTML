<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <!-- link css -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- jss link -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</head>

<body>
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center">
                <h3>Addmission Form</h3>
            </div>

            <!-- card body -->
            <!-- Name -->
            <div class="card-body">
                <form action="">
                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input class="form-control" type="text" placeholder="Enter Your Name">
                    </div>

                    <!-- Email -->
                    
                            <div class="mb-3">Email</label>
                                <input class="form-control" type="text" placeholder="Enter Your Email">
                            </div>

                            <!-- Phone -->
                                    <div class="mb-3">
                                        <label class="form-label">Phone Number</label>
                                        <input class="form-control" type="number" placeholder="Enter Phone Number">
                                    </div>

                                    <!-- gender -->
                                    <div class="mb-3">
                                        <label class="form-label">Gender</label>
                                        <div class="form-check form-check-line">
                                            <input class="form-check-input" type="radio" name="gender">
                                            <label class="form-check-label">male</label>
                                        </div>

                                        <div class="mb-3">

                                            <div class="form-check form-check-line">
                                                <input class="form-check-input" type="radio" name="gender">
                                                <label class="form-check-label">Female</label>
                                            </div>
                                        </div>

                                        <!-- course -->
                                        <div class="mb-3">
                                            <label class="form-label">Select course</label>
                                            <select class="form-select">
                                                <option selected>Choose.....</option>
                                                <option>BCA</option>
                                                <option>B.COM</option>
                                                <option>BTECH</option>
                                            </select>
                                        </div>

                                        <!-- Address -->
                                        <div class="mb-3">
                                            <label class="form-label">Address</label>
                                            <textarea class="form-control" rows="2"></textarea>
                                        </div>

                                        <!-- checkBox -->
                                        <div class="mb-3 form-check">
                                            <input type="checkbox" class="form-check-input">
                                            <label class="form-check-label">I agree to terms and conditions</label>
                                        </div>

                                        <!-- button -->
                                        <div class="d-grid">
                                            <button class="btn btn-success" type="submit">Submit</button>
                                        </div>
                                </form>
                            </div>
                    </div>
            </div>

</body>
</html>
